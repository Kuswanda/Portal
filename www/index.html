<!DOCTYPE html>
<html>
<head>
  <script src="https://unpkg.com/@capacitor/device@6.0.0/dist/plugin.js"></script>
</head>
<body>
  <h3>Login Portal GIS</h3>
  <input id="nip" placeholder="Masukkan NIP">
  <input id="nama" placeholder="Masukkan Nama">
  <button onclick="login()">Login</button>
  <p id="pesan"></p>

<script>
  let DEVICE_ID = "";

  // 1. AMBIL IMEI SAAT APK DIBUKA
  window.onload = async function() {
    const info = await Capacitor.Device.getId();
    DEVICE_ID = info.identifier; // UUID HP
    document.getElementById("pesan").innerText = "Device: " + DEVICE_ID;
  }

  // 2. KIRIM KE APPS SCRIPT
  function login(){
    const nip = document.getElementById("nip").value;
    const nama = document.getElementById("nama").value;

    google.script.run.withSuccessHandler(function(res){
      if(res.status == "OK"){
        window.location.href = res.redirect; // Langsung ke portal
      } else {
        document.getElementById("pesan").innerText = res.msg;
      }
    }).cekLogin(nip, nama, DEVICE_ID);
  }
</script>
</body>
</html>
