<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal GIS</title>
  <script type="module" src="https://cdn.jsdelivr.net/npm/@capacitor/core@6/dist/capacitor.js"></script>
</head>
<body style="text-align:center; padding-top:50px; font-family:sans-serif;">
  <h3>Sedang Mengecek Device...</h3>
  <p>Mohon tunggu</p>

  <script>
    // URL Apps Script WebApp kamu. GANTI INI
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx.../exec";

    async function main() {
      try {
        // Cek apakah jalan di APK Capacitor
        if (window.Capacitor && window.Capacitor.Plugins.Device) {
          const info = await window.Capacitor.Plugins.Device.getId();
          const imei = info.identifier; // INI ID PATEN DARI HP
          
          // Redirect ke Apps Script + bawa IMEI
          window.location.href = APPS_SCRIPT_URL + "?imei=" + imei;
          
        } else {
          document.body.innerHTML = "<h3>Gagal</h3><p>Buka aplikasi ini hanya lewat APK</p>";
        }
      } catch(e) {
        document.body.innerHTML = "<h3>Error</h3><p>" + e + "</p>";
      }
    }
    main();
  </script>
</body>
</html>
